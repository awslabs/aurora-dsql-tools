name: dsql-lint npm CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'npm/**'
      - '.github/workflows/dsql-lint-npm-*.yml'
  pull_request:
    branches: [main]
    paths:
      - 'npm/**'
      - '.github/workflows/dsql-lint-npm-*.yml'
  workflow_dispatch:

jobs:
  wrapper-tests:
    name: Wrapper tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run wrapper unit tests
        run: node --test npm/dsql-lint/test/wrapper.test.js

  lint-workflows:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          files: .github/workflows/dsql-lint-npm-*.yml
