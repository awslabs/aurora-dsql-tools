name: dsql-lint CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'dsql-lint/**'
      - '.github/workflows/dsql-lint-ci.yml'
      - '.github/workflows/dsql-cluster-*.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dsql-lint/**'
      - '.github/workflows/dsql-lint-ci.yml'
      - '.github/workflows/dsql-cluster-*.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: dsql-lint

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dsql-lint

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Run unit and integration tests
        run: cargo test

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

  build-wheel:
    name: Build and Smoke-test Python Wheel
    runs-on: ubuntu-latest
    needs: build
    # Override the repo-level default so paths like `dist/` resolve relative
    # to the workspace root, matching where maturin-action writes the wheel.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          args: --release --out dist
          working-directory: dsql-lint/pypi
          manylinux: auto
          sccache: "true"

      - name: Smoke-test wheel installs and console script runs
        run: |
          python -m venv /tmp/smoke
          source /tmp/smoke/bin/activate
          pip install --find-links=dsql-lint/pypi/dist --no-index dsql-lint
          dsql-lint --version

  build-nupkg:
    name: Build and Smoke-test NuGet Package
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dsql-lint

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build dsql-lint binary
        run: cargo build --release
        working-directory: dsql-lint

      - name: Stage binary into runtimes layout
        run: |
          mkdir -p dsql-lint/nuget/runtimes/linux-x64/native
          cp dsql-lint/target/release/dsql-lint dsql-lint/nuget/runtimes/linux-x64/native/
          chmod +x dsql-lint/nuget/runtimes/linux-x64/native/dsql-lint

      - name: Pack NuGet package
        run: dotnet pack --configuration Release
        working-directory: dsql-lint/nuget

      - name: Smoke-test global tool install
        run: |
          dotnet tool install --global --add-source dsql-lint/nuget/bin/Release Amazon.AuroraDsql.Lint
          dsql-lint --version

  create-cluster:
    needs: build
    uses: ./.github/workflows/dsql-cluster-create.yml
    with:
      workflow_name: dsql-lint
    secrets:
      IAM_ROLE: ${{ secrets.IAM_ROLE }}
    permissions:
      id-token: write

  cluster-tests:
    name: DSQL Cluster Tests
    needs: create-cluster
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dsql-lint

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}
          aws-region: ${{ needs.create-cluster.outputs.region }}

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run DSQL cluster tests
        working-directory: dsql-lint
        env:
          DSQL_ENDPOINT: ${{ needs.create-cluster.outputs.cluster-endpoint }}
        run: RUSTFLAGS='--cfg dsql_cluster' cargo test -- --test-threads=1

  delete-cluster:
    if: always() && needs.create-cluster.result == 'success'
    needs: [create-cluster, cluster-tests]
    uses: ./.github/workflows/dsql-cluster-delete.yml
    with:
      cluster-id: ${{ needs.create-cluster.outputs.cluster-id }}
      region: ${{ needs.create-cluster.outputs.region }}
    secrets:
      IAM_ROLE: ${{ secrets.IAM_ROLE }}
    permissions:
      id-token: write
