name: dsql-lint CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'dsql-lint/**'
      - '.github/workflows/dsql-lint-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dsql-lint/**'
      - '.github/workflows/dsql-lint-ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: dsql-lint

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test
