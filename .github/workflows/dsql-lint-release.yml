name: Publish dsql-lint to crates.io

permissions: {}

on:
  push:
    tags:
      - "dsql-lint/v*"

defaults:
  run:
    working-directory: dsql-lint

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: rust
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CRATES_PUBLISH_IAM_ROLE }}
          role-session-name: dsql-lint-crates-publish
          aws-region: us-east-1

      - name: Get crates.io API Key
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "prod/cratesio/account-credentials" \
            --query 'SecretString' \
            --output text)
          CRATES_IO_KEY=$(echo "$SECRET_JSON" | jq -r '.["Github API Key"]')
          echo "::add-mask::$CRATES_IO_KEY"
          echo "CRATES_IO_KEY=$CRATES_IO_KEY" >> "$GITHUB_ENV"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#dsql-lint/v}"
          echo "Publishing version $VERSION"
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ env.CRATES_IO_KEY }}
